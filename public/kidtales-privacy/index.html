<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KidTales AI Privacy Policy</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect — route /kidtales-privacy to the React app
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>
      Redirecting to KidTales AI Privacy Policy…
      <a href="/?/kidtales-privacy">Click here if you are not redirected.</a>
    </p>
  </body>
</html>
